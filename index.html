<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f2d;
            --card-bg: #161b3d;
            --text-color: #ffffff;
            --accent-color: #00d2ff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
        }
        .header {
            height: 80px;
            background: linear-gradient(to bottom, #1a237e, transparent);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--accent-color);
        }
        .header .date {
            position: absolute;
            right: 20px;
            bottom: 10px;
            color: #aaa;
        }
        .date-selector {
            position: absolute;
            left: 20px;
            bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-selector label {
            color: #aaa;
            font-size: 14px;
        }
        .date-selector select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid #2a3166;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .date-selector select:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 120px 400px 300px;
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #2a3166;
        }
        .summary-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .summary-card .label { font-size: 16px; color: #ccc; margin-bottom: 5px; }
        .summary-card .value { font-size: 28px; font-weight: bold; color: var(--accent-color); }
        .chart-container {
            grid-column: span 2;
        }
        .chart-box {
            width: 100%;
            height: 100%;
        }
        .chart-title {
            font-size: 18px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="date-selector">
            <label for="dateSelect">选择日期:</label>
            <select id="dateSelect">
            </select>
        </div>
        <h1>香港疫情数据实时监控大屏</h1>
        <div class="date" id="currentDate">数据日期: --</div>
    </div>

    <div class="container">
        <div class="card summary-card">
            <div class="label">累计确诊</div>
            <div class="value" id="totalConfirmed">0</div>
        </div>
        <div class="card summary-card">
            <div class="label">今日新增</div>
            <div class="value" id="totalNew" style="color: #ff4d4f;">0</div>
        </div>
        <div class="card summary-card">
            <div class="label">累计康复</div>
            <div class="value" id="totalRecovered" style="color: #52c41a;">0</div>
        </div>
        <div class="card summary-card">
            <div class="label">累计死亡</div>
            <div class="value" id="totalDeath" style="color: #fadb14;">0</div>
        </div>

        <div class="card chart-container">
            <div class="chart-title">疫情趋势图 (新增与累计)</div>
            <div id="trendChart" class="chart-box"></div>
        </div>
        <div class="card chart-container">
            <div class="chart-title">各地区确诊分布</div>
            <div id="districtChart" class="chart-box"></div>
        </div>

        <div class="card chart-container">
            <div class="chart-title">病例增长率变化 (%)</div>
            <div id="growthChart" class="chart-box"></div>
        </div>
        <div class="card chart-container">
            <div class="chart-title">风险等级分布</div>
            <div id="riskChart" class="chart-box"></div>
        </div>
    </div>

    <script>
        let dashboardData = null;
        let trendChart = null;
        let districtChart = null;
        let growthChart = null;
        let riskChart = null;

        async function initDashboard() {
            console.log('Starting initDashboard...');
            try {
                const response = await fetch('dashboard_data.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('Failed to load data');
                }
                dashboardData = await response.json();
                console.log('Loaded data:', dashboardData);

                const dateSelect = document.getElementById('dateSelect');
                dashboardData.available_dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = date;
                    dateSelect.appendChild(option);
                });

                const latestDate = dashboardData.available_dates[dashboardData.available_dates.length - 1];
                dateSelect.value = latestDate;

                trendChart = echarts.init(document.getElementById('trendChart'), 'dark');
                districtChart = echarts.init(document.getElementById('districtChart'), 'dark');
                growthChart = echarts.init(document.getElementById('growthChart'), 'dark');
                riskChart = echarts.init(document.getElementById('riskChart'), 'dark');

                updateDashboard(latestDate);

                dateSelect.addEventListener('change', (e) => {
                    updateDashboard(e.target.value);
                });

                window.addEventListener('resize', () => {
                    trendChart.resize();
                    districtChart.resize();
                    growthChart.resize();
                    riskChart.resize();
                });
            } catch (error) {
                console.error('Error in initDashboard:', error);
            }
        }

        function updateDashboard(selectedDate) {
            if (!dashboardData) {
                console.log('No dashboard data available');
                return;
            }

            console.log('Updating for date:', selectedDate);

            const summary = dashboardData.all_summaries[selectedDate];
            const districtData = dashboardData.all_district_data[selectedDate];

            if (!summary || !districtData) {
                console.error('Data not found for date:', selectedDate);
                return;
            }

            const dateIndex = dashboardData.available_dates.indexOf(selectedDate);

            document.getElementById('totalConfirmed').innerText = summary.total_confirmed.toLocaleString();
            document.getElementById('totalNew').innerText = summary.total_new.toLocaleString();
            document.getElementById('totalRecovered').innerText = summary.total_recovered.toLocaleString();
            document.getElementById('totalDeath').innerText = summary.total_death.toLocaleString();
            document.getElementById('currentDate').innerText = '数据日期: ' + selectedDate;

            trendChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                legend: { data: ['每日新增', '累计确诊'], top: 10 },
                xAxis: { type: 'category', data: dashboardData.daily_trend.dates.slice(0, dateIndex + 1) },
                yAxis: [
                    { type: 'value', name: '新增' },
                    { type: 'value', name: '累计', splitLine: { show: false } }
                ],
                series: [
                    {
                        name: '每日新增',
                        type: 'line',
                        data: dashboardData.daily_trend.new_cases.slice(0, dateIndex + 1),
                        smooth: true,
                        areaStyle: { opacity: 0.3 },
                        itemStyle: { color: '#ff4d4f' }
                    },
                    {
                        name: '累计确诊',
                        type: 'line',
                        yAxisIndex: 1,
                        data: dashboardData.daily_trend.total_cases.slice(0, dateIndex + 1),
                        itemStyle: { color: '#00d2ff' }
                    }
                ]
            });

            const sortedDistricts = districtData.sort((a, b) => b.value - a.value);
            districtChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: sortedDistricts.map(d => d.name).reverse() },
                series: [{
                    name: '累计确诊',
                    type: 'bar',
                    data: sortedDistricts.map(d => d.value).reverse(),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#161b3d' },
                            { offset: 1, color: '#00d2ff' }
                        ])
                    }
                }]
            });

            growthChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: dashboardData.daily_trend.dates.slice(0, dateIndex + 1) },
                yAxis: { type: 'value', name: '%' },
                series: [{
                    name: '增长率',
                    type: 'line',
                    data: dashboardData.daily_trend.growth_rates.slice(0, dateIndex + 1),
                    smooth: true,
                    lineStyle: { width: 3, color: '#fadb14' },
                    symbol: 'none'
                }]
            });

            const riskCounts = {};
            districtData.forEach(d => {
                riskCounts[d.risk] = (riskCounts[d.risk] || 0) + 1;
            });
            const riskData = Object.keys(riskCounts).map(key => ({ name: key, value: riskCounts[key] }));

            riskChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item' },
                legend: { orient: 'vertical', left: 'left' },
                series: [{
                    type: 'pie',
                    radius: '70%',
                    data: riskData,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });
        }

        initDashboard();
    </script>
</body>
</html>
