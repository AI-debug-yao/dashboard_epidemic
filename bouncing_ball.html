<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色小球在三角形内运动</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 3px solid #fff;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #fff;
            color: #667eea;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🔴 红色小球在三角形内运动</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="controls">
        <button onclick="resetBall()">重置小球</button>
        <button onclick="toggleSpeed()">调整速度</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 三角形的三个顶点
        let triangle = {
            p1: { x: 400, y: 80 },
            p2: { x: 100, y: 500 },
            p3: { x: 700, y: 500 }
        };
        
        // 小球
        let ball = {
            x: 400,
            y: 300,
            radius: 15,
            vx: 3,
            vy: 2,
            speed: 1
        };
        
        // 计算两点之间的距离
        function distance(p1, p2) {
            return Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
        }
        
        // 计算点到线段的最近点和距离
        function closestPointOnSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax;
            const dy = by - ay;
            const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy)));
            return {
                x: ax + t * dx,
                y: ay + t * dy
            };
        }
        
        // 计算反射向量
        function reflect(vx, vy, nx, ny) {
            const dot = vx * nx + vy * ny;
            return {
                vx: vx - 2 * dot * nx,
                vy: vy - 2 * dot * ny
            };
        }
        
        // 检测小球与三角形边界的碰撞
        function checkCollision() {
            const edges = [
                { a: triangle.p1, b: triangle.p2 },
                { a: triangle.p2, b: triangle.p3 },
                { a: triangle.p3, b: triangle.p1 }
            ];
            
            for (let edge of edges) {
                const closest = closestPointOnSegment(ball.x, ball.y, edge.a.x, edge.a.y, edge.b.x, edge.b.y);
                const dist = distance(ball, closest);
                
                if (dist < ball.radius) {
                    // 计算法向量
                    let nx = edge.b.y - edge.a.y;
                    let ny = edge.a.x - edge.b.x;
                    const len = Math.sqrt(nx * nx + ny * ny);
                    nx /= len;
                    ny /= len;
                    
                    // 确保法向量指向三角形内部
                    const centerX = (triangle.p1.x + triangle.p2.x + triangle.p3.x) / 3;
                    const centerY = (triangle.p1.y + triangle.p2.y + triangle.p3.y) / 3;
                    if ((closest.x - centerX) * nx + (closest.y - centerY) * ny > 0) {
                        nx = -nx;
                        ny = -ny;
                    }
                    
                    // 反射小球
                    const reflected = reflect(ball.vx, ball.vy, nx, ny);
                    ball.vx = reflected.vx;
                    ball.vy = reflected.vy;
                    
                    // 将球推回三角形内部
                    const pushDist = ball.radius - dist + 0.5;
                    ball.x += nx * pushDist;
                    ball.y += ny * pushDist;
                }
            }
        }
        
        // 绘制三角形
        function drawTriangle() {
            ctx.beginPath();
            ctx.moveTo(triangle.p1.x, triangle.p1.y);
            ctx.lineTo(triangle.p2.x, triangle.p2.y);
            ctx.lineTo(triangle.p3.x, triangle.p3.y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // 绘制小球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            
            // 径向渐变
            const gradient = ctx.createRadialGradient(
                ball.x - 5, ball.y - 5, 0,
                ball.x, ball.y, ball.radius
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#c92a2a');
            
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 添加高光
            ctx.beginPath();
            ctx.arc(ball.x - 5, ball.y - 5, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
        }
        
        // 更新小球位置
        function update() {
            ball.x += ball.vx * ball.speed;
            ball.y += ball.vy * ball.speed;
            checkCollision();
        }
        
        // 主渲染循环
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTriangle();
            drawBall();
            update();
            requestAnimationFrame(render);
        }
        
        // 重置小球
        function resetBall() {
            ball.x = 400;
            ball.y = 300;
            ball.vx = (Math.random() - 0.5) * 6;
            ball.vy = (Math.random() - 0.5) * 6;
            if (Math.abs(ball.vx) < 1) ball.vx = 2;
            if (Math.abs(ball.vy) < 1) ball.vy = 2;
        }
        
        // 调整速度
        function toggleSpeed() {
            ball.speed = ball.speed === 1.5 ? 0.5 : ball.speed === 0.5 ? 3 : 1.5;
        }
        
        // 开始动画
        render();
    </script>
</body>
</html>
